version: '3.9'

services:
  postgres:
    image: postgres:17.4
    container_name: postgres_icompras_clientes
    restart: unless-stopped
    environment:
      POSTGRES_DB: icompras_clientes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - clientes-data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  clientes-data: